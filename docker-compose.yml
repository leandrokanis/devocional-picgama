name: devocional-picgama

services:
  api:
    image: devocional-picgama/api:2.0.0
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devocional-picgama-api
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=4000
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SEND_TIME=${SEND_TIME:-06:00}
      - TZ=${TZ:-${TIMEZONE:-America/Sao_Paulo}}
      - TIMEZONE=${TZ:-${TIMEZONE:-America/Sao_Paulo}}
      - WHATSAPP_SESSION_NAME=${WHATSAPP_SESSION_NAME:-devocional-bot}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - ADMIN_USER=${ADMIN_USER:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=file:/app/data/devocional.db
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - devocional-network
    x-casaos:
      envs:
        - container: ADMIN_USER
          description:
            en_US: Admin username for panel login.
            pt_BR: Usuario admin para login no painel.
        - container: ADMIN_PASSWORD
          description:
            en_US: Admin password for panel login.
            pt_BR: Senha admin para login no painel.
        - container: AUTH_TOKEN
          description:
            en_US: API bearer token returned after login.
            pt_BR: Token bearer da API retornado apos login.
        - container: SEND_TIME
          description:
            en_US: Daily send time (HH:mm).
            pt_BR: Horario de envio diario (HH:mm).
        - container: TZ
          description:
            en_US: Timezone.
            pt_BR: Fuso horario.
      volumes:
        - container: /app/data
          description:
            en_US: Database and WhatsApp session data.
            pt_BR: Dados do banco e sessao WhatsApp.

  ui:
    image: devocional-picgama/ui:2.0.0
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    container_name: devocional-picgama-ui
    ports:
      - "${WEBUI_PORT:-${UI_PORT:-31902}}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devocional-network

networks:
  devocional-network:
    driver: bridge

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: ui
  author: Picgama
  category: Lifestyle
  description:
    en_US: Devocional Picgama - Daily devotional scheduler with WhatsApp delivery.
    pt_BR: Devocional Picgama - Agendador de devocionais diarios com envio via WhatsApp.
  developer: Picgama
  icon: https://raw.githubusercontent.com/leandrokanis/devocional-picgama/main/casaos/icon.png
  tagline:
    en_US: Schedule and send daily devotionals via WhatsApp.
    pt_BR: Agende e envie devocionais diarios via WhatsApp.
  title:
    en_US: Devocional Picgama
    pt_BR: Devocional Picgama
  tips:
    before_install:
      pt_BR: |
        Configure `ADMIN_USER` e `ADMIN_PASSWORD` para habilitar o login do painel.
        Defina `AUTH_TOKEN` para manter o token da API fixo entre reinicios.
      en_US: |
        Configure `ADMIN_USER` and `ADMIN_PASSWORD` to enable panel login.
        Set `AUTH_TOKEN` to keep API token stable across restarts.
  index: /
  port_map: "${WEBUI_PORT:-${UI_PORT:-31902}}"
  scheme: http
